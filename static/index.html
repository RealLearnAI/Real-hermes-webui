<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hermes WebUI - 小雨</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

:root {
  --bg-primary: #0f0f14;
  --bg-secondary: #1a1a24;
  --bg-tertiary: #252530;
  --bg-hover: #2d2d3a;
  --text-primary: #e8e8ef;
  --text-secondary: #9898b0;
  --text-muted: #686880;
  --accent: #7c5cff;
  --accent-hover: #9478ff;
  --accent-glow: rgba(124, 92, 255, 0.3);
  --success: #34d399;
  --warning: #fbbf24;
  --error: #f87171;
  --info: #60a5fa;
  --border: #2d2d3a;
  --user-bubble: #7c5cff;
  --ai-bubble: #1e1e2e;
  --radius: 12px;
  --radius-sm: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans SC', sans-serif;
  background: var(--bg-primary);
  color: var(--text-primary);
  height: 100vh;
  overflow: hidden;
}

.app { display: flex; height: 100vh; }

.sidebar {
  width: 280px; background: var(--bg-secondary);
  border-right: 1px solid var(--border);
  display: flex; flex-direction: column; flex-shrink: 0;
}

.sidebar-header { padding: 20px; border-bottom: 1px solid var(--border); }

.logo {
  display: flex; align-items: center; gap: 12px;
  font-size: 18px; font-weight: 700;
}

.logo-icon {
  width: 36px; height: 36px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center; font-size: 20px;
}

.new-chat-btn {
  margin-top: 16px; width: 100%; padding: 12px;
  background: var(--accent); color: white; border: none;
  border-radius: var(--radius-sm); font-size: 14px; font-weight: 600;
  cursor: pointer; transition: all 0.2s;
}

.new-chat-btn:hover { background: var(--accent-hover); }

.session-list { flex: 1; overflow-y: auto; padding: 12px; }

.session-item {
  padding: 12px 16px; border-radius: var(--radius-sm);
  cursor: pointer; margin-bottom: 4px; transition: all 0.15s;
  display: flex; align-items: center; justify-content: space-between;
}

.session-item:hover { background: var(--bg-hover); }
.session-item.active { background: var(--accent); color: white; }

.session-title {
  font-size: 14px; overflow: hidden; text-overflow: ellipsis;
  white-space: nowrap; flex: 1;
}

.session-delete {
  opacity: 0; background: none; border: none;
  color: inherit; cursor: pointer; font-size: 16px;
  padding: 4px 8px; border-radius: 4px;
}

.session-item:hover .session-delete { opacity: 0.7; }
.session-delete:hover { opacity: 1 !important; background: rgba(255,255,255,0.1); }

.main { flex: 1; display: flex; flex-direction: column; min-width: 0; }

.chat-header {
  padding: 16px 24px; border-bottom: 1px solid var(--border);
  display: flex; align-items: center; gap: 12px;
}

.chat-header h2 { font-size: 16px; font-weight: 600; }

.status-dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--success);
}

.status-dot.busy { background: var(--warning); animation: pulse 1.5s infinite; }

@keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }

.messages-container {
  flex: 1; overflow-y: auto; padding: 24px; scroll-behavior: smooth;
}

.message { display: flex; gap: 12px; margin-bottom: 24px; max-width: 800px; }
.message.user { flex-direction: row-reverse; }

.avatar {
  width: 36px; height: 36px; border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 16px; flex-shrink: 0;
}

.message.user .avatar { background: var(--user-bubble); }
.message.assistant .avatar { background: var(--bg-tertiary); border: 1px solid var(--border); }

.bubble {
  padding: 14px 18px; border-radius: var(--radius);
  line-height: 1.6; font-size: 15px; word-break: break-word;
}

.message.user .bubble {
  background: var(--user-bubble); color: white; border-top-right-radius: 4px;
}

.message.assistant .bubble {
  background: var(--ai-bubble); border: 1px solid var(--border); border-top-left-radius: 4px;
}

.bubble p { margin-bottom: 8px; }
.bubble p:last-child { margin-bottom: 0; }

.bubble code {
  background: var(--bg-tertiary); padding: 2px 6px; border-radius: 4px;
  font-family: 'Cascadia Code', 'Fira Code', monospace; font-size: 13px;
}

.bubble pre {
  background: var(--bg-primary); padding: 12px; border-radius: var(--radius-sm);
  overflow-x: auto; margin: 8px 0; border: 1px solid var(--border);
}

.bubble pre code { background: none; padding: 0; }

.typing-indicator { display: flex; gap: 4px; padding: 8px 0; }

.typing-dot {
  width: 8px; height: 8px; background: var(--text-muted);
  border-radius: 50%; animation: typingBounce 1.4s infinite;
}

.typing-dot:nth-child(2) { animation-delay: 0.2s; }
.typing-dot:nth-child(3) { animation-delay: 0.4s; }

@keyframes typingBounce {
  0%, 60%, 100% { transform: translateY(0); }
  30% { transform: translateY(-8px); }
}

.input-area {
  padding: 16px 24px; border-top: 1px solid var(--border); background: var(--bg-secondary);
}

.input-wrapper { display: flex; gap: 12px; max-width: 800px; margin: 0 auto; }

.message-input {
  flex: 1; padding: 14px 18px; background: var(--bg-tertiary);
  border: 1px solid var(--border); border-radius: var(--radius);
  color: var(--text-primary); font-size: 15px; resize: none;
  min-height: 48px; max-height: 200px; line-height: 1.5; font-family: inherit;
}

.message-input:focus {
  outline: none; border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-glow);
}

.send-btn, .stop-btn {
  padding: 14px 24px; color: white; border: none;
  border-radius: var(--radius); font-size: 15px; font-weight: 600;
  cursor: pointer; align-self: flex-end; transition: all 0.2s;
}

.send-btn { background: var(--accent); }
.send-btn:hover { background: var(--accent-hover); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; }
.stop-btn { background: var(--error); }

.welcome {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 100%; text-align: center; padding: 40px;
}

.welcome-icon { font-size: 64px; margin-bottom: 24px; }

.welcome h1 {
  font-size: 28px; margin-bottom: 12px;
  background: linear-gradient(135deg, var(--accent), #a78bfa);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
}

.welcome p { color: var(--text-secondary); max-width: 500px; line-height: 1.6; }

.capabilities {
  display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
  gap: 16px; margin-top: 32px; max-width: 700px; width: 100%;
}

.capability {
  background: var(--bg-secondary); border: 1px solid var(--border);
  padding: 16px; border-radius: var(--radius-sm); text-align: left;
}

.capability-icon { font-size: 24px; margin-bottom: 8px; }
.capability h3 { font-size: 14px; margin-bottom: 4px; }
.capability p { font-size: 12px; color: var(--text-muted); }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--bg-tertiary); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

@media (max-width: 768px) { .sidebar { display: none; } }
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <div class="logo-icon">🌈</div>
        <span>Hermes WebUI</span>
      </div>
      <button class="new-chat-btn" onclick="createNewSession()">+ 新对话</button>
    </div>
    <div class="session-list" id="sessionList"></div>
  </aside>

  <main class="main">
    <div class="chat-header">
      <div class="status-dot" id="statusDot"></div>
      <h2 id="chatTitle">小雨</h2>
    </div>

    <div class="messages-container" id="messagesContainer">
      <div class="welcome" id="welcomeScreen">
        <div class="welcome-icon">🌈</div>
        <h1>你好，我是小雨</h1>
        <p>Hermes Agent 的 Web 界面。我可以调用所有工具和能力来帮助你。</p>
        <div class="capabilities">
          <div class="capability"><div class="capability-icon">💻</div><h3>终端操作</h3><p>执行 shell 命令，管理文件和进程</p></div>
          <div class="capability"><div class="capability-icon">🌐</div><h3>网络搜索</h3><p>搜索网页内容，提取信息</p></div>
          <div class="capability"><div class="capability-icon">📁</div><h3>文件操作</h3><p>读写文件，代码编辑和搜索</p></div>
          <div class="capability"><div class="capability-icon">🧠</div><h3>代码执行</h3><p>运行 Python 脚本，数据分析</p></div>
          <div class="capability"><div class="capability-icon">🖼️</div><h3>图像处理</h3><p>图片分析、生成和编辑</p></div>
          <div class="capability"><div class="capability-icon">⏰</div><h3>定时任务</h3><p>创建和管理 cron 定时任务</p></div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrapper">
        <textarea class="message-input" id="messageInput" placeholder="输入消息... (Enter 发送, Shift+Enter 换行)" rows="1"></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()">发送</button>
        <button class="stop-btn" id="stopBtn" onclick="abortMessage()" style="display:none">停止</button>
      </div>
    </div>
  </main>
</div>

<script>
let currentSession = null;
let sessions = [];
let isRunning = false;
let abortController = null;

const messagesContainer = document.getElementById('messagesContainer');
const messageInput = document.getElementById('messageInput');
const sendBtn = document.getElementById('sendBtn');
const stopBtn = document.getElementById('stopBtn');
const statusDot = document.getElementById('statusDot');
const chatTitle = document.getElementById('chatTitle');
const sessionList = document.getElementById('sessionList');

messageInput.addEventListener('input', () => {
  messageInput.style.height = 'auto';
  messageInput.style.height = Math.min(messageInput.scrollHeight, 200) + 'px';
});

messageInput.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

async function loadSessions() {
  try {
    const resp = await fetch('/api/sessions');
    sessions = await resp.json();
    renderSessionList();
    if (sessions.length > 0) switchSession(sessions[sessions.length - 1].id);
  } catch (e) { console.error('Failed to load sessions:', e); }
}

function renderSessionList() {
  sessionList.innerHTML = '';
  sessions.forEach(session => {
    const item = document.createElement('div');
    item.className = 'session-item' + (currentSession && currentSession.id === session.id ? ' active' : '');
    item.onclick = () => switchSession(session.id);
    
    const title = document.createElement('span');
    title.className = 'session-title';
    title.textContent = session.title || '对话';
    
    const deleteBtn = document.createElement('button');
    deleteBtn.className = 'session-delete';
    deleteBtn.innerHTML = '🗑️';
    deleteBtn.onclick = (e) => { e.stopPropagation(); deleteSession(session.id); };
    
    item.appendChild(title);
    item.appendChild(deleteBtn);
    sessionList.appendChild(item);
  });
}

async function createNewSession() {
  const resp = await fetch('/api/sessions', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ title: '新对话' }),
  });
  const session = await resp.json();
  sessions.push(session);
  renderSessionList();
  switchSession(session.id);
}

async function deleteSession(id) {
  await fetch(`/api/sessions/${id}`, { method: 'DELETE' });
  sessions = sessions.filter(s => s.id !== id);
  if (currentSession && currentSession.id === id) {
    currentSession = null;
    messagesContainer.innerHTML = '';
    messagesContainer.appendChild(createWelcomeScreen());
  }
  renderSessionList();
}

function switchSession(id) {
  const session = sessions.find(s => s.id === id);
  if (!session) return;
  
  currentSession = session;
  chatTitle.textContent = session.title || '对话';
  renderSessionList();
  
  messagesContainer.innerHTML = '';
  if (session.messages && session.messages.length > 0) {
    session.messages.forEach(msg => appendMessage(msg.role, msg.content, false));
  } else {
    messagesContainer.appendChild(createWelcomeScreen());
  }
}

function createWelcomeScreen() {
  const div = document.createElement('div');
  div.className = 'welcome';
  div.innerHTML = `
    <div class="welcome-icon">🌈</div>
    <h1>你好，我是小雨</h1>
    <p>Hermes Agent 的 Web 界面。我可以调用所有工具和能力来帮助你。</p>
  `;
  return div;
}

function formatMessage(text) {
  let html = text
    .replace(/```(\w*)\n([\s\S]*?)```/g, '<pre><code>$2</code></pre>')
    .replace(/`([^`]+)`/g, '<code>$1</code>')
    .replace(/\n/g, '<br>');
  return html;
}

function appendMessage(role, content, scroll = true) {
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();
  
  const msgDiv = document.createElement('div');
  msgDiv.className = `message ${role}`;
  
  const avatar = document.createElement('div');
  avatar.className = 'avatar';
  avatar.textContent = role === 'user' ? '👤' : '🌈';
  
  const bubble = document.createElement('div');
  bubble.className = 'bubble';
  bubble.innerHTML = formatMessage(content);
  
  msgDiv.appendChild(avatar);
  msgDiv.appendChild(bubble);
  messagesContainer.appendChild(msgDiv);
  
  if (scroll) messagesContainer.scrollTop = messagesContainer.scrollHeight;
  
  return { msgDiv, bubble };
}

async function sendMessage() {
  const text = messageInput.value.trim();
  if (!text || isRunning) return;
  
  const welcome = document.getElementById('welcomeScreen');
  if (welcome) welcome.remove();
  
  if (!currentSession) {
    const resp = await fetch('/api/sessions', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ title: text.substring(0, 30) }),
    });
    currentSession = await resp.json();
    sessions.push(currentSession);
    renderSessionList();
    chatTitle.textContent = currentSession.title;
  }
  
  messageInput.value = '';
  messageInput.style.height = 'auto';
  
  appendMessage('user', text);
  if (!currentSession.messages) currentSession.messages = [];
  currentSession.messages.push({ role: 'user', content: text });
  
  isRunning = true;
  sendBtn.style.display = 'none';
  stopBtn.style.display = 'block';
  statusDot.className = 'status-dot busy';
  
  const { bubble } = appendMessage('assistant', '');
  bubble.innerHTML = '<div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div>';
  
  abortController = new AbortController();
  
  try {
    const responseText = await streamChat(text, bubble);
    if (responseText) {
      currentSession.messages.push({ role: 'assistant', content: responseText });
    }
  } catch (e) {
    if (e.name !== 'AbortError') {
      bubble.innerHTML += `<br><em style="color: var(--error)">出错: ${escapeHtml(e.message)}</em>`;
    }
  }
  
  isRunning = false;
  abortController = null;
  sendBtn.style.display = 'block';
  stopBtn.style.display = 'none';
  statusDot.className = 'status-dot';
}

async function streamChat(userMessage, bubble) {
  const resp = await fetch('/api/chat', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      messages: [{ role: 'user', content: userMessage }],
      session_id: currentSession.hermes_session_id,
    }),
    signal: abortController.signal,
  });
  
  if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
  
  const reader = resp.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';
  let fullResponse = '';
  
  while (true) {
    const { done, value } = await reader.read();
    if (done) break;
    
    buffer += decoder.decode(value, { stream: true });
    
    const lines = buffer.split('\n');
    buffer = lines.pop() || '';
    
    for (const line of lines) {
      if (line.startsWith('data: ')) {
        try {
          const evt = JSON.parse(line.slice(6));
          
          if (evt.type === 'chunk') {
            if (bubble.querySelector('.typing-indicator')) {
              bubble.innerHTML = '';
            }
            fullResponse += evt.content;
            bubble.innerHTML = formatMessage(fullResponse);
            messagesContainer.scrollTop = messagesContainer.scrollHeight;
          }
          
          if (evt.type === 'done') {
            fullResponse = evt.response || fullResponse;
            bubble.innerHTML = formatMessage(fullResponse);
            if (evt.session_id) {
              currentSession.hermes_session_id = evt.session_id;
            }
          }
          
          if (evt.type === 'error') {
            throw new Error(evt.message);
          }
        } catch (e) {
          if (e.name !== 'AbortError') throw e;
        }
      }
    }
  }
  
  return fullResponse;
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text;
  return div.innerHTML;
}

function abortMessage() {
  if (abortController) abortController.abort();
}

// Initialize
loadSessions();
messageInput.focus();
</script>
</body>
</html>
