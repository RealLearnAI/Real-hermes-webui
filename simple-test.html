<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Simple Test</title>
  <style>
    body { background: #0d1117; color: white; font-family: sans-serif; padding: 20px; }
    .box { border: 1px solid #30363d; padding: 15px; margin: 10px 0; border-radius: 8px; background: #161b22; }
    button { padding: 8px 16px; background: #238636; color: white; border: none; border-radius: 4px; cursor: pointer; }
    button:hover { background: #2ea043; }
  </style>
</head>
<body>
  <h1 style="color: #58a6ff">Simple Test Page</h1>
  
  <div class="box">
    <h3>Status:</h3>
    <p id="status">Loading...</p>
  </div>
  
  <div class="box">
    <h3>Actions:</h3>
    <button onclick="testHealth()">Test /health</button>
    <button onclick="testGPU()">Test GPU API</button>
    <button onclick="testGateway()">Test Gateway Chat</button>
  </div>

  <script>
    function updateStatus(id, result) {
      const el = document.getElementById(id);
      if (el) {
        el.innerHTML = '<pre>' + JSON.stringify(result, null, 2) + '</pre>';
      }
    }
    
    async function testHealth() {
      try {
        const resp = await fetch('/health');
        const data = await resp.json();
        updateStatus('status', data);
      } catch (e) {
        document.getElementById('status').textContent = 'Error: ' + e.message;
      }
    }
    
    async function testGPU() {
      try {
        const resp = await fetch('/api/gpu');
        const data = await resp.json();
        updateStatus('status', data);
      } catch (e) {
        document.getElementById('status').textContent = 'GPU Error: ' + e.message;
      }
    }
    
    async function testGateway() {
      try {
        // Test chat completion
        const resp = await fetch('/v1/chat/completions', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            model: 'hermes-agent',
            messages: [{ role: 'user', content: 'Say hello briefly' }],
            max_tokens: 20
          })
        });
        
        if (!resp.ok) {
          throw new Error(`HTTP ${resp.status}`);
        }
        
        const data = await resp.json();
        updateStatus('status', {
          status: 'OK',
          message: data.choices?.[0]?.message?.content,
          usage: data.usage
        });
      } catch (e) {
        document.getElementById('status').textContent = 'Gateway Error: ' + e.message;
      }
    }
    
    // Auto run health check on load
    window.addEventListener('DOMContentLoaded', () => {
      testHealth();
    });
  </script>
</body>
</html>
